<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HuggingFace LLM Trends Explorer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
  }
}
</script>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242836;
  --border: #2e3348;
  --text: #e4e7ef;
  --text2: #8b90a5;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --green: #00cec9;
  --orange: #fdcb6e;
  --red: #ff7675;
  --blue: #74b9ff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; }
.header { padding: 24px 32px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
.header h1 { font-size: 22px; font-weight: 700; }
.header h1 span { color: var(--accent2); }
.header .stats { display: flex; gap: 24px; }
.stat-box { text-align: center; }
.stat-box .val { font-size: 24px; font-weight: 700; color: var(--accent2); }
.stat-box .label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; }
.loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; }
.loading-overlay.hidden { display: none; }
.spinner { width: 48px; height: 48px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { margin-top: 16px; color: var(--text2); font-size: 14px; }
.progress-bar { width: 300px; height: 4px; background: var(--border); border-radius: 2px; margin-top: 12px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
.container { max-width: 1400px; margin: 0 auto; padding: 24px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.grid.triple { grid-template-columns: 1fr 1fr 1fr; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.card h2 { font-size: 14px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
.card.full { grid-column: 1 / -1; }
canvas { max-height: 320px; }
.tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.tab { padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; background: var(--surface2); color: var(--text2); border: 1px solid var(--border); transition: all 0.2s; }
.tab.active { background: var(--accent); color: white; border-color: var(--accent); }
.tab:hover { border-color: var(--accent2); }
.tree-container { max-height: 600px; overflow-y: auto; }
.tree-item { margin-bottom: 12px; }
.base-model { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--surface2); border-radius: 8px; cursor: pointer; border: 1px solid var(--border); transition: all 0.2s; }
.base-model:hover { border-color: var(--accent); }
.base-model .name { font-weight: 600; font-size: 13px; flex: 1; }
.base-model .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--accent); color: white; }
.base-model .params { font-size: 11px; color: var(--text2); }
.finetunes { margin-left: 28px; border-left: 2px solid var(--border); padding-left: 16px; margin-top: 4px; display: none; }
.finetunes.open { display: block; }
.ft-item { padding: 6px 10px; font-size: 12px; color: var(--text2); display: flex; justify-content: space-between; align-items: center; border-radius: 4px; }
.ft-item:hover { background: var(--surface2); }
.ft-item .dl { color: var(--green); font-size: 11px; }
.ft-item a { color: var(--accent2); text-decoration: none; }
.ft-item a:hover { text-decoration: underline; }
.category-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
.cat-base { background: #6c5ce733; color: var(--accent2); }
.cat-ft { background: #00cec933; color: var(--green); }
.cat-quant { background: #fdcb6e33; color: var(--orange); }
.cat-lora { background: #ff767533; color: var(--red); }
.table-container { max-height: 500px; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { position: sticky; top: 0; background: var(--surface); padding: 10px 8px; text-align: left; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); cursor: pointer; }
th:hover { color: var(--accent2); }
td { padding: 8px; border-bottom: 1px solid var(--border); }
td a { color: var(--accent2); text-decoration: none; }
td a:hover { text-decoration: underline; }
tr:hover { background: var(--surface2); }
.search-box { width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; margin-bottom: 16px; outline: none; }
.search-box:focus { border-color: var(--accent); }
.chart-note { font-size: 11px; color: var(--text2); margin-top: 8px; }
.card-fs { position: relative; }
.card-fs .fs-btn { position: absolute; top: 12px; right: 14px; cursor: pointer; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); font-size: 12px; padding: 4px 10px; z-index: 5; transition: all 0.2s; }
.card-fs .fs-btn:hover { border-color: var(--accent); color: var(--text); }
.card-fs.fullscreen { position: fixed; inset: 0; z-index: 1000; margin: 0; border-radius: 0; overflow: auto; display: flex; flex-direction: column; }
.card-fs.fullscreen canvas { max-height: none !important; flex: 1; }
.card-fs.fullscreen .fs-btn { top: 16px; right: 20px; }
#scatter3d-card { position: relative; }
#scatter3d-tooltip { display: none; position: fixed; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; font-size: 12px; color: var(--text); pointer-events: none; z-index: 1001; max-width: 400px; line-height: 1.6; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
#scatter3d-tooltip .tt-name { font-weight: 700; font-size: 13px; color: var(--accent2); margin-bottom: 4px; word-break: break-all; }
#scatter3d-tooltip .tt-row { display: flex; justify-content: space-between; gap: 16px; }
#scatter3d-tooltip .tt-label { color: var(--text2); }
#scatter3d-tooltip .tt-val { font-weight: 600; }
#scatter3d-card.fullscreen { position: fixed; inset: 0; z-index: 1000; margin: 0; border-radius: 0; overflow: auto; display: flex; flex-direction: column; }
#scatter3d-card.fullscreen #scatter3d-container { flex: 1; height: auto !important; border-radius: 0; }
@media (max-width: 900px) {
  .grid, .grid.triple { grid-template-columns: 1fr; }
  .header { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">Loading model data...</div>
</div>

<div class="header">
  <h1>HuggingFace <span>LLM Trends</span> Explorer</h1>
  <div class="data-date" id="data-date" style="font-size:12px;color:#8b90a5;"></div>
  <div class="stats" id="header-stats"></div>
</div>

<div class="container" id="app">
  <!-- Charts and content injected by JS -->
</div>

<script src="lib.js"></script>
<script>
let allModels = [];
let dataUpdatedAt = '';

function toggleFS(btn) {
  const card = btn.closest('.card-fs');
  card.classList.toggle('fullscreen');
  const isFS = card.classList.contains('fullscreen');
  btn.textContent = isFS ? '\u2716' : '\u26F6';
  // Resize chart after layout change
  setTimeout(() => { window.dispatchEvent(new Event('resize')); }, 50);
}
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const fs = document.querySelector('.card-fs.fullscreen');
    if (fs) { fs.querySelector('.fs-btn').click(); }
  }
});

async function loadData() {
  const resp = await fetch('data.json');
  if (!resp.ok) throw new Error(`Failed to load data.json: HTTP ${resp.status}`);
  const data = await resp.json();
  allModels = data.models;
  dataUpdatedAt = data.updatedAt;
}

function buildHeaderStats() {
  const categories = { base: 0, finetune: 0, quantized: 0, adapter: 0 };
  allModels.forEach(m => { categories[getModelCategory(m)]++; });
  const totalDownloads = allModels.reduce((s, m) => s + (m.downloads || 0), 0);
  const providersSet = new Set();
  allModels.forEach(m => getInferenceProviders(m).forEach(p => providersSet.add(p)));

  document.getElementById('data-date').textContent = dataUpdatedAt
    ? `Data updated: ${new Date(dataUpdatedAt).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}`
    : '';

  document.getElementById('header-stats').innerHTML = `
    <div class="stat-box"><div class="val">${formatNum(allModels.length)}</div><div class="label">Models (1K+ DL)</div></div>
    <div class="stat-box"><div class="val">${formatNum(categories.base)}</div><div class="label">Base Models</div></div>
    <div class="stat-box"><div class="val">${formatNum(categories.finetune + categories.adapter + categories.quantized)}</div><div class="label">Derivatives</div></div>
    <div class="stat-box"><div class="val">${formatNum(totalDownloads)}</div><div class="label">Total Downloads</div></div>
    <div class="stat-box"><div class="val">${providersSet.size}</div><div class="label">Inference Providers</div></div>
  `;
}

function renderApp() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="grid">
      <div class="card"><h2>New Models by Week</h2><canvas id="chart-timeline"></canvas></div>
      <div class="card"><h2>Model Size Distribution</h2><canvas id="chart-sizes"></canvas></div>
    </div>
    <div class="grid triple">
      <div class="card"><h2>Category Breakdown</h2><canvas id="chart-categories"></canvas></div>
      <div class="card"><h2>Top Downloads</h2><canvas id="chart-downloads"></canvas></div>
      <div class="card"><h2>Top Inference Providers</h2><canvas id="chart-providers"></canvas></div>
    </div>
    <div class="card full" style="margin-bottom:20px" id="scatter3d-card">
      <h2>Downloads by Model Size &amp; Release Date (3D)</h2>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px;">
        <div style="font-size:11px;color:var(--text2);">Drag to rotate, scroll to zoom, right-click to pan. Colors: <span style="color:#6c5ce7">Base</span> / <span style="color:#00cec9">Fine-tune</span> / <span style="color:#fdcb6e">Quantized</span> / <span style="color:#ff7675">LoRA</span></div>
        <div style="display:flex;gap:6px;">
          <button id="btn-view-front" class="tab" style="cursor:pointer;">Front</button>
          <button id="btn-view-top" class="tab" style="cursor:pointer;">Top</button>
          <button id="btn-view-side" class="tab" style="cursor:pointer;">Side</button>
          <button id="btn-view-reset" class="tab active" style="cursor:pointer;">3D</button>
          <button id="btn-fullscreen" class="tab" style="cursor:pointer;">&#x26F6; Fullscreen</button>
        </div>
      </div>
      <div id="scatter3d-container" style="width:100%;height:550px;position:relative;border-radius:8px;overflow:hidden;background:#0a0c12;"></div>
      <div id="scatter3d-tooltip"></div>
    </div>
    <div class="grid triple">
      <div class="card card-fs" id="card-scatter"><button class="fs-btn" onclick="toggleFS(this)">&#x26F6;</button><h2>Downloads by Model Size</h2><canvas id="chart-scatter"></canvas></div>
      <div class="card card-fs" id="card-size-date"><button class="fs-btn" onclick="toggleFS(this)">&#x26F6;</button><h2>Model Size by Release Date</h2><canvas id="chart-size-date"></canvas></div>
      <div class="card"><h2>Monthly Trends</h2><canvas id="chart-monthly"></canvas></div>
    </div>
    <div class="card full" style="margin-bottom:20px">
      <h2>Base Model &rarr; Fine-tune Relationships</h2>
      <div class="tabs" id="tree-tabs"></div>
      <input class="search-box" id="tree-search" placeholder="Search models...">
      <div class="tree-container" id="tree-container"></div>
    </div>
    <div class="card full">
      <h2>All Models</h2>
      <input class="search-box" id="table-search" placeholder="Search by name, author, or tag...">
      <div class="table-container" id="table-container"></div>
    </div>
  `;

  buildCharts();
  buildTree();
  buildTable();
}

function buildCharts() {
  const chartDefaults = {
    color: '#8b90a5',
    borderColor: '#2e3348',
    font: { family: '-apple-system, sans-serif' }
  };
  Chart.defaults.color = chartDefaults.color;
  Chart.defaults.borderColor = chartDefaults.borderColor;

  // Timeline chart - models per week
  const weekMap = {};
  allModels.forEach(m => {
    const d = new Date(m.createdAt);
    const weekStart = new Date(d);
    weekStart.setDate(d.getDate() - d.getDay());
    const key = weekStart.toISOString().slice(0, 10);
    if (!weekMap[key]) weekMap[key] = { base: 0, ft: 0 };
    if (getModelCategory(m) === 'base') weekMap[key].base++;
    else weekMap[key].ft++;
  });
  const weekKeys = Object.keys(weekMap).sort();
  new Chart(document.getElementById('chart-timeline'), {
    type: 'bar',
    data: {
      labels: weekKeys,
      datasets: [
        { label: 'Base Models', data: weekKeys.map(k => weekMap[k].base), backgroundColor: '#6c5ce7cc', borderRadius: 3 },
        { label: 'Derivatives', data: weekKeys.map(k => weekMap[k].ft), backgroundColor: '#00cec9cc', borderRadius: 3 }
      ]
    },
    options: {
      responsive: true, plugins: { legend: { position: 'top' } },
      scales: { x: { stacked: true, ticks: { maxRotation: 45 } }, y: { stacked: true, beginAtZero: true } }
    }
  });

  // Size distribution
  const sizeBuckets = { '<1B': 0, '1-3B': 0, '3-7B': 0, '7-14B': 0, '14-35B': 0, '35-72B': 0, '72B+': 0, 'Unknown': 0 };
  allModels.forEach(m => {
    const p = getParamCount(m);
    if (!p) sizeBuckets['Unknown']++;
    else if (p < 1e9) sizeBuckets['<1B']++;
    else if (p < 3e9) sizeBuckets['1-3B']++;
    else if (p < 7e9) sizeBuckets['3-7B']++;
    else if (p < 14e9) sizeBuckets['7-14B']++;
    else if (p < 35e9) sizeBuckets['14-35B']++;
    else if (p < 72e9) sizeBuckets['35-72B']++;
    else sizeBuckets['72B+']++;
  });
  new Chart(document.getElementById('chart-sizes'), {
    type: 'bar',
    data: {
      labels: Object.keys(sizeBuckets),
      datasets: [{ label: 'Models', data: Object.values(sizeBuckets),
        backgroundColor: ['#a29bfe', '#6c5ce7', '#74b9ff', '#0984e3', '#00cec9', '#fdcb6e', '#ff7675', '#636e72'],
        borderRadius: 4 }]
    },
    options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
  });

  // Category breakdown (doughnut)
  const cats = { base: 0, finetune: 0, quantized: 0, adapter: 0 };
  allModels.forEach(m => cats[getModelCategory(m)]++);
  new Chart(document.getElementById('chart-categories'), {
    type: 'doughnut',
    data: {
      labels: ['Base/Foundation', 'Fine-tuned', 'Quantized', 'LoRA/Adapter'],
      datasets: [{ data: [cats.base, cats.finetune, cats.quantized, cats.adapter],
        backgroundColor: ['#6c5ce7', '#00cec9', '#fdcb6e', '#ff7675'],
        borderWidth: 0 }]
    },
    options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
  });

  // Top downloads
  const topDL = [...allModels].sort((a, b) => b.downloads - a.downloads).slice(0, 15);
  new Chart(document.getElementById('chart-downloads'), {
    type: 'bar',
    data: {
      labels: topDL.map(m => m.id.length > 25 ? m.id.split('/').pop() : m.id),
      datasets: [{ label: 'Downloads', data: topDL.map(m => m.downloads), backgroundColor: '#74b9ffcc', borderRadius: 3 }]
    },
    options: { indexAxis: 'y', responsive: true, plugins: { legend: { display: false } },
      scales: { x: { ticks: { callback: v => formatNum(v) } } } }
  });

  // Inference providers
  const providerCount = {};
  allModels.forEach(m => {
    getInferenceProviders(m).forEach(p => { providerCount[p] = (providerCount[p] || 0) + 1; });
  });
  const provEntries = Object.entries(providerCount).sort((a, b) => b[1] - a[1]).slice(0, 15);
  new Chart(document.getElementById('chart-providers'), {
    type: 'bar',
    data: {
      labels: provEntries.map(e => e[0]),
      datasets: [{ label: 'Models Supported', data: provEntries.map(e => e[1]), backgroundColor: '#fdcb6ecc', borderRadius: 3 }]
    },
    options: { indexAxis: 'y', responsive: true, plugins: { legend: { display: false } } }
  });

  // Scatter: downloads vs size
  const scatterData = allModels.filter(m => getParamCount(m)).map(m => ({
    x: getParamCount(m) / 1e9,
    y: m.downloads,
    label: m.id
  }));
  new Chart(document.getElementById('chart-scatter'), {
    type: 'scatter',
    data: {
      datasets: [{
        label: 'Models',
        data: scatterData,
        backgroundColor: (ctx) => {
          const cat = getModelCategory(allModels.find(m => m.id === ctx.raw?.label) || {});
          return cat === 'base' ? '#6c5ce7aa' : cat === 'quantized' ? '#fdcb6eaa' : cat === 'adapter' ? '#ff7675aa' : '#00cec9aa';
        },
        pointRadius: 2.5,
        pointHoverRadius: 5
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => `${ctx.raw.label}: ${formatParams(ctx.raw.x * 1e9)} params, ${formatNum(ctx.raw.y)} downloads` } }
      },
      scales: {
        x: { type: 'logarithmic', title: { display: true, text: 'Parameters (B)' }, ticks: { callback: v => formatNum(v * 1e9) } },
        y: { type: 'logarithmic', title: { display: true, text: 'Downloads' }, ticks: { callback: v => formatNum(v) } }
      }
    }
  });

  // Model Size by Release Date
  const sizeDateData = allModels.filter(m => getParamCount(m) && m.createdAt).map(m => ({
    x: m.createdAt.slice(0, 10),
    y: getParamCount(m) / 1e9,
    label: m.id
  }));
  const catColorMap = { base: '#6c5ce7aa', finetune: '#00cec9aa', quantized: '#fdcb6eaa', adapter: '#ff7675aa' };
  new Chart(document.getElementById('chart-size-date'), {
    type: 'scatter',
    data: {
      datasets: [{
        label: 'Models',
        data: sizeDateData,
        backgroundColor: (ctx) => {
          const cat = getModelCategory(allModels.find(m => m.id === ctx.raw?.label) || {});
          return catColorMap[cat] || '#8b90a5aa';
        },
        pointRadius: 2.5,
        pointHoverRadius: 5
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => `${ctx.raw.label}: ${formatParams(ctx.raw.y * 1e9)} — ${ctx.raw.x}` } }
      },
      scales: {
        x: { type: 'time', time: { unit: 'week', tooltipFormat: 'MMM d' }, title: { display: true, text: 'Release Date' } },
        y: { type: 'logarithmic', title: { display: true, text: 'Parameters (B)' }, ticks: { callback: v => formatNum(v * 1e9) } }
      }
    }
  });

  // Monthly trends
  const monthMap = {};
  allModels.forEach(m => {
    const key = m.createdAt.slice(0, 7);
    if (!monthMap[key]) monthMap[key] = { count: 0, downloads: 0, base: 0, ft: 0, providers: new Set() };
    monthMap[key].count++;
    monthMap[key].downloads += m.downloads || 0;
    if (getModelCategory(m) === 'base') monthMap[key].base++;
    else monthMap[key].ft++;
    getInferenceProviders(m).forEach(p => monthMap[key].providers.add(p));
  });
  const monthKeys = Object.keys(monthMap).sort();
  new Chart(document.getElementById('chart-monthly'), {
    type: 'line',
    data: {
      labels: monthKeys,
      datasets: [
        { label: 'Total Models', data: monthKeys.map(k => monthMap[k].count), borderColor: '#6c5ce7', backgroundColor: '#6c5ce733', fill: true, tension: 0.3 },
        { label: 'Base Models', data: monthKeys.map(k => monthMap[k].base), borderColor: '#a29bfe', borderDash: [5, 5], tension: 0.3 },
        { label: 'Derivatives', data: monthKeys.map(k => monthMap[k].ft), borderColor: '#00cec9', tension: 0.3 }
      ]
    },
    options: { responsive: true, plugins: { legend: { position: 'top' } }, scales: { y: { beginAtZero: true } } }
  });

  // 3D Scatter (async - loads Three.js module)
  build3DScatter();
}

async function build3DScatter() {
  const THREE = await import('three');
  const { OrbitControls } = await import('three/addons/controls/OrbitControls.js');

  const container = document.getElementById('scatter3d-container');
  const tooltip = document.getElementById('scatter3d-tooltip');
  const width = container.clientWidth;
  const height = container.clientHeight;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0c12);

  const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
  camera.position.set(16, 8, 16);

  let renderer;
  try {
    renderer = new THREE.WebGLRenderer({ antialias: true });
  } catch (e) {
    container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#8b90a5;font-size:14px;">3D chart requires WebGL. Please use a browser with WebGL support.</div>';
    return;
  }
  renderer.setSize(width, height);
  renderer.setPixelRatio(window.devicePixelRatio);
  container.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.5;
  controls.target.set(4, 3, 4); // Look slightly below center to push chart left/down

  // Prepare data - 3 axes: X=log(params), Y=log(downloads), Z=date
  const models3d = allModels.filter(m => getParamCount(m) && m.createdAt);
  const dates = models3d.map(m => new Date(m.createdAt).getTime());
  const minDate = Math.min(...dates);
  const maxDate = Math.max(...dates);
  const dateRange = maxDate - minDate || 1;

  const params = models3d.map(m => Math.log10(getParamCount(m)));
  const minP = Math.min(...params);
  const maxP = Math.max(...params);
  const pRange = maxP - minP || 1;

  const dls = models3d.map(m => Math.log10(Math.max(m.downloads, 1)));
  const minDL = Math.min(...dls);
  const maxDL = Math.max(...dls);
  const dlRange = maxDL - minDL || 1;

  const AXIS_LEN = 10;
  const catColors = { base: 0x6c5ce7, finetune: 0x00cec9, quantized: 0xfdcb6e, adapter: 0xff7675 };

  // Points
  const pointsData = [];
  const geometry = new THREE.BufferGeometry();
  const positions = [];
  const colors = [];
  const sizes = [];

  models3d.forEach((m, i) => {
    const x = ((params[i] - minP) / pRange) * AXIS_LEN;
    const y = ((dls[i] - minDL) / dlRange) * AXIS_LEN;
    const z = ((dates[i] - minDate) / dateRange) * AXIS_LEN;
    positions.push(x, y, z);

    const cat = getModelCategory(m);
    const col = new THREE.Color(catColors[cat] || 0x8b90a5);
    colors.push(col.r, col.g, col.b);

    // Size based on downloads
    const s = 1.5 + (dls[i] - minDL) / dlRange * 3;
    sizes.push(s);

    pointsData.push({ model: m, pos: new THREE.Vector3(x, y, z), cat });
  });

  geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  geometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));

  const pointsMaterial = new THREE.ShaderMaterial({
    vertexShader: `
      attribute float size;
      varying vec3 vColor;
      void main() {
        vColor = color;
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = size * (150.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      void main() {
        float d = length(gl_PointCoord - vec2(0.5));
        if (d > 0.5) discard;
        float alpha = 1.0 - smoothstep(0.35, 0.5, d);
        gl_FragColor = vec4(vColor, alpha * 0.85);
      }
    `,
    vertexColors: true,
    transparent: true,
    depthWrite: false,
  });

  const points = new THREE.Points(geometry, pointsMaterial);
  scene.add(points);

  // Axes
  const axisMat = new THREE.LineBasicMaterial({ color: 0x2e3348 });
  function addAxis(from, to) {
    const g = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(...from), new THREE.Vector3(...to)]);
    scene.add(new THREE.Line(g, axisMat));
  }
  addAxis([0, 0, 0], [AXIS_LEN, 0, 0]);
  addAxis([0, 0, 0], [0, AXIS_LEN, 0]);
  addAxis([0, 0, 0], [0, 0, AXIS_LEN]);

  // Grid on floor
  const gridHelper = new THREE.GridHelper(AXIS_LEN, 10, 0x1a1d27, 0x1a1d27);
  gridHelper.position.set(AXIS_LEN / 2, 0, AXIS_LEN / 2);
  scene.add(gridHelper);

  // Axis labels using sprites
  function makeLabel(text, position, color = '#8b90a5') {
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = color;
    ctx.font = 'bold 28px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(text, 128, 40);
    const texture = new THREE.CanvasTexture(canvas);
    const mat = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(mat);
    sprite.position.set(...position);
    sprite.scale.set(3, 0.75, 1);
    scene.add(sprite);
  }

  makeLabel('Parameters (B)', [AXIS_LEN / 2, -1, 0], '#a29bfe');
  makeLabel('Downloads', [- 1.5, AXIS_LEN / 2, 0], '#74b9ff');
  makeLabel('Release Date', [0, -1, AXIS_LEN / 2], '#00cec9');

  // Tick labels
  function addTicks(axis, min, max, count, formatter) {
    for (let i = 0; i <= count; i++) {
      const t = i / count;
      const val = min + t * (max - min);
      const pos = t * AXIS_LEN;
      let position;
      if (axis === 'x') position = [pos, -0.5, -0.3];
      else if (axis === 'y') position = [-0.8, pos, 0];
      else position = [-0.3, -0.5, pos];
      makeLabel(formatter(val), position, '#555');
    }
  }

  addTicks('x', minP, maxP, 4, v => formatParams(Math.pow(10, v)));
  addTicks('y', minDL, maxDL, 4, v => formatNum(Math.round(Math.pow(10, v))));
  addTicks('z', 0, 1, 4, v => {
    const d = new Date(minDate + v * dateRange);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  });

  // Raycaster for hover tooltip
  const raycaster = new THREE.Raycaster();
  raycaster.params.Points.threshold = 0.3;
  const mouse = new THREE.Vector2();
  let hoveredIdx = -1;

  container.addEventListener('mousemove', (e) => {
    const rect = container.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(points);

    if (intersects.length > 0) {
      const idx = intersects[0].index;
      if (idx !== hoveredIdx) {
        hoveredIdx = idx;
        const pd = pointsData[idx];
        const m = pd.model;
        const cat = pd.cat;
        const catLabel = { base: 'Base', finetune: 'Fine-tune', quantized: 'Quantized', adapter: 'LoRA/Adapter' }[cat] || cat;
        const catColor = { base: '#6c5ce7', finetune: '#00cec9', quantized: '#fdcb6e', adapter: '#ff7675' }[cat] || '#8b90a5';
        const providers = getInferenceProviders(m);
        const baseId = getBaseModelId(m);
        tooltip.style.display = 'block';
        tooltip.innerHTML = `
          <div class="tt-name">${m.id}</div>
          <div class="tt-row"><span class="tt-label">Category</span><span class="tt-val" style="color:${catColor}">${catLabel}</span></div>
          <div class="tt-row"><span class="tt-label">Parameters</span><span class="tt-val">${formatParams(getParamCount(m))}</span></div>
          <div class="tt-row"><span class="tt-label">Downloads</span><span class="tt-val">${formatNum(m.downloads)}</span></div>
          <div class="tt-row"><span class="tt-label">Released</span><span class="tt-val">${m.createdAt?.slice(0, 10)}</span></div>
          ${baseId ? `<div class="tt-row"><span class="tt-label">Base Model</span><span class="tt-val" style="font-size:11px">${baseId}</span></div>` : ''}
          ${providers.length ? `<div class="tt-row"><span class="tt-label">Providers</span><span class="tt-val">${providers.join(', ')}</span></div>` : ''}`;
      }
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
      controls.autoRotate = false;
    } else {
      tooltip.style.display = 'none';
      hoveredIdx = -1;
      controls.autoRotate = true;
    }
  });

  container.addEventListener('mouseleave', () => {
    tooltip.style.display = 'none';
    hoveredIdx = -1;
    controls.autoRotate = true;
  });

  // Animate
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  // View presets
  const CENTER = new THREE.Vector3(4, 3, 4);
  function setView(pos, target) {
    camera.position.set(...pos);
    controls.target.copy(target || CENTER);
    controls.autoRotate = false;
    controls.update();
    document.querySelectorAll('#btn-view-front,#btn-view-top,#btn-view-side,#btn-view-reset').forEach(b => b.classList.remove('active'));
  }
  document.getElementById('btn-view-front').addEventListener('click', () => {
    setView([4, 3, 20]);
    document.getElementById('btn-view-front').classList.add('active');
  });
  document.getElementById('btn-view-top').addEventListener('click', () => {
    setView([4, 18, 4.01]);
    document.getElementById('btn-view-top').classList.add('active');
  });
  document.getElementById('btn-view-side').addEventListener('click', () => {
    setView([20, 3, 4]);
    document.getElementById('btn-view-side').classList.add('active');
  });
  document.getElementById('btn-view-reset').addEventListener('click', () => {
    setView([16, 8, 16]);
    controls.autoRotate = true;
    document.getElementById('btn-view-reset').classList.add('active');
  });

  // Fullscreen
  const card = document.getElementById('scatter3d-card');
  const fsBtn = document.getElementById('btn-fullscreen');
  fsBtn.addEventListener('click', () => {
    card.classList.toggle('fullscreen');
    const isFS = card.classList.contains('fullscreen');
    fsBtn.textContent = isFS ? '\u2716 Exit' : '\u26F6 Fullscreen';
    fsBtn.classList.toggle('active', isFS);
    // Trigger resize after layout settles
    setTimeout(() => {
      const w = container.clientWidth;
      const h = container.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }, 50);
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && card.classList.contains('fullscreen')) {
      fsBtn.click();
    }
  });

  // Resize
  const resizeObs = new ResizeObserver(() => {
    const w = container.clientWidth;
    const h = container.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });
  resizeObs.observe(container);
}

function buildTree() {
  // Build base model -> finetune mapping
  const baseMap = {}; // baseModelId -> { model, finetunes: [] }
  const baseLookup = {}; // model.id -> model for base models

  // First pass: identify base models
  allModels.forEach(m => {
    if (getModelCategory(m) === 'base') {
      baseLookup[m.id] = m;
    }
  });

  // Second pass: map derivatives to their base
  allModels.forEach(m => {
    const cat = getModelCategory(m);
    if (cat !== 'base') {
      const baseId = getBaseModelId(m);
      if (baseId) {
        if (!baseMap[baseId]) baseMap[baseId] = { finetunes: [] };
        baseMap[baseId].finetunes.push({ model: m, category: cat });
      }
    }
  });

  // Sort by number of derivatives
  const sorted = Object.entries(baseMap)
    .filter(([, v]) => v.finetunes.length > 0)
    .sort((a, b) => b[1].finetunes.length - a[1].finetunes.length);

  // Tabs: All, Top 10, Top 20
  const tabs = document.getElementById('tree-tabs');
  const views = [
    { label: 'Top 10', count: 10 },
    { label: 'Top 25', count: 25 },
    { label: 'Top 50', count: 50 },
    { label: 'All', count: sorted.length }
  ];
  views.forEach((v, i) => {
    const btn = document.createElement('div');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.textContent = v.label;
    btn.onclick = () => {
      tabs.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderTree(sorted.slice(0, v.count));
    };
    tabs.appendChild(btn);
  });

  document.getElementById('tree-search').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    const filtered = sorted.filter(([baseId, v]) =>
      baseId.toLowerCase().includes(q) || v.finetunes.some(f => f.model.id.toLowerCase().includes(q))
    );
    renderTree(filtered.slice(0, 50));
  });

  renderTree(sorted.slice(0, 10));
}

function renderTree(items) {
  const container = document.getElementById('tree-container');
  container.innerHTML = items.map(([baseId, v]) => {
    const baseModel = allModels.find(m => m.id === baseId);
    const params = baseModel ? getParamCount(baseModel) : null;
    const catTags = { finetune: '<span class="category-tag cat-ft">fine-tune</span>',
      quantized: '<span class="category-tag cat-quant">quantized</span>',
      adapter: '<span class="category-tag cat-lora">LoRA</span>' };

    const fts = v.finetunes
      .sort((a, b) => (b.model.downloads || 0) - (a.model.downloads || 0))
      .map(f => `<div class="ft-item">
        <span><a href="https://huggingface.co/${f.model.id}" target="_blank">${f.model.id}</a>${catTags[f.category] || ''}</span>
        <span class="dl">${formatNum(f.model.downloads || 0)} DL</span>
      </div>`).join('');

    return `<div class="tree-item">
      <div class="base-model" onclick="this.nextElementSibling.classList.toggle('open')">
        <span style="color:var(--accent2)">&#9654;</span>
        <span class="name">${baseId} <span class="category-tag cat-base">base</span></span>
        ${params ? `<span class="params">${formatParams(params)}</span>` : ''}
        <span class="badge">${v.finetunes.length} derivatives</span>
      </div>
      <div class="finetunes">${fts}</div>
    </div>`;
  }).join('');
}

function buildTable() {
  const container = document.getElementById('table-container');
  let sortField = 'downloads';
  let sortDir = -1;
  let searchQ = '';

  function render() {
    let filtered = allModels;
    if (searchQ) {
      filtered = filtered.filter(m =>
        m.id.toLowerCase().includes(searchQ) || (m.tags || []).some(t => t.toLowerCase().includes(searchQ))
      );
    }
    filtered = [...filtered].sort((a, b) => {
      let va, vb;
      if (sortField === 'downloads') { va = a.downloads || 0; vb = b.downloads || 0; }
      else if (sortField === 'params') { va = getParamCount(a) || 0; vb = getParamCount(b) || 0; }
      else if (sortField === 'date') { va = a.createdAt; vb = b.createdAt; }
      else if (sortField === 'providers') { va = getInferenceProviders(a).length; vb = getInferenceProviders(b).length; }
      else if (sortField === 'name') { va = a.id.toLowerCase(); vb = b.id.toLowerCase(); }
      else { va = a[sortField]; vb = b[sortField]; }
      if (va < vb) return sortDir;
      if (va > vb) return -sortDir;
      return 0;
    });

    container.innerHTML = `<table>
      <thead><tr>
        <th data-sort="name">Model</th>
        <th data-sort="category">Category</th>
        <th data-sort="params">Params</th>
        <th data-sort="downloads">Downloads</th>
        <th data-sort="providers">Providers</th>
        <th data-sort="date">Created</th>
      </tr></thead>
      <tbody>${filtered.slice(0, 200).map(m => {
        const cat = getModelCategory(m);
        const catLabel = { base: 'Base', finetune: 'Fine-tune', quantized: 'Quantized', adapter: 'LoRA/Adapter' }[cat];
        const catClass = { base: 'cat-base', finetune: 'cat-ft', quantized: 'cat-quant', adapter: 'cat-lora' }[cat];
        const providers = getInferenceProviders(m);
        return `<tr>
          <td><a href="https://huggingface.co/${m.id}" target="_blank">${m.id}</a></td>
          <td><span class="category-tag ${catClass}">${catLabel}</span></td>
          <td>${formatParams(getParamCount(m))}</td>
          <td>${formatNum(m.downloads || 0)}</td>
          <td>${providers.length > 0 ? providers.length + ' (' + providers.slice(0, 3).join(', ') + (providers.length > 3 ? '...' : '') + ')' : '-'}</td>
          <td>${m.createdAt?.slice(0, 10) || '-'}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;

    container.querySelectorAll('th').forEach(th => {
      th.addEventListener('click', () => {
        const field = th.dataset.sort;
        if (sortField === field) sortDir *= -1;
        else { sortField = field; sortDir = -1; }
        render();
      });
    });
  }

  document.getElementById('table-search').addEventListener('input', e => {
    searchQ = e.target.value.toLowerCase();
    render();
  });

  render();
}

// Main
(async () => {
  try {
    await loadData();
    document.getElementById('loading').classList.add('hidden');
    buildHeaderStats();
    renderApp();
  } catch (e) {
    document.getElementById('loading-text').textContent = `Error: ${e.message}. Run "node update-data.js" to generate data.json`;
    console.error(e);
  }
})();
</script>
